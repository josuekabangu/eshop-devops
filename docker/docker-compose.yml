services:
  # =====================================================================
  # POSTGRES PGVECTOR
  # =====================================================================
  postgres:
    image: ankane/pgvector:latest
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      RABBITMQ_DEFAULT_PASS: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata 
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/postgres/init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - eshop-network 

  # =====================================================================
  # REDIS
  # =====================================================================
  redis:
    image: redis:7
    container_name: redis
    command: 
      - redis-server
      - --requirepass ${REDIS_PASSWORD}
      - --maxmemory 1gb
      - --maxmemory-policy allkeys-lru
      - --appendonly yes
      - --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - eshop-network

  # =====================================================================
  # RABBITMQ
  # =====================================================================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - rmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - eshop-network

  # =====================================================================
  # CATALOG.API
  # =====================================================================
  catalog-api:
    build: 
      context: ..
      dockerfile: src/Catalog.API/Dockerfile 
    container_name: catalog-api
    environment:
      ConnectionStrings__catalogdb: "Host=postgres;Port=5432;Database=catalogdb;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__eventbus: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
    ports:
      - "5102:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - eshop-network

  # =====================================================================
  # BASKET.API
  # =====================================================================
  basket-api:
    build: 
      context: ..
      dockerfile: src/Basket.API/Dockerfile
    container_name: basket-api
    environment:
      ConnectionStrings__redis: "redis:6379,password=${REDIS_PASSWORD}"
      ConnectionStrings__eventbus: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
    ports:
      - "5103:8080"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - eshop-network

  # =====================================================================
  # ORDERING.API
  # =====================================================================
  ordering-api:
    build:
      context: ..
      dockerfile: src/Ordering.API/Dockerfile
    container_name: ordering-api
    environment:
      ConnectionStrings__orderingdb: "Host=postgres;Port=5432;Database=orderingdb;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__eventbus: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
    ports:
      - "5104:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - eshop-network

  # =====================================================================
  # ORDER-PROCESSOR (background worker)
  # =====================================================================
  order-processor:
    build:
      context: ..
      dockerfile: src/OrderProcessor/Dockerfile
    container_name: order-processor
    environment:
      ConnectionStrings__orderingdb: "Host=postgres;Port=5432;Database=orderingdb;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__eventbus: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - eshop-network

  # =====================================================================
  # PAYMENT-PROCESSOR (background worker)
  # =====================================================================
  payment-processor:
    build:
      context: ..
      dockerfile: src/PaymentProcessor/Dockerfile
    container_name: payment-processor
    environment:
      ConnectionStrings__EventBus: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - eshop-network     
  
  # =====================================================================
  # IDENTITY.API
  # =====================================================================
  identity-api:
    build:
      context: ..
      dockerfile: src/Identity.API/Dockerfile
    container_name: identity-api
    environment:
      ConnectionStrings__identitydb: "Host=postgres;Port=5432;Database=identitydb;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    ports:
      - "5223:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eshop-network

  # =====================================================================
  # WEBHOOKS.API
  # =====================================================================
  webhooks-api:
    build:
      context: ..
      dockerfile: src/Webhooks.API/Dockerfile
    container_name: webhooks-api
    environment:
      ConnectionStrings__webhooksdb: "Host=postgres;Port=5432;Database=webhooksdb;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__eventbus: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
    ports:
      - "5110:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - eshop-network

  # =====================================================================
  # WEBHOOK-CLIENT (Blazor)
  # =====================================================================
  webhook-client:
    build:
      context: ..
      dockerfile: src/WebhookClient/Dockerfile
    container_name: webhook-client
    environment:
      IdentityUrl: "http://192.168.56.11:5223"
      CallBackUrl: "http://192.168.56.11:5114"
    ports:
      - "5114:8080"
    depends_on:
      identity-api:
        condition: service_started
      webhooks-api:
        condition: service_started
    networks:
      - eshop-network


volumes:
  pg_data:
  redis_data:
  rmq_data:

networks:
  eshop-network:
    driver: bridge
