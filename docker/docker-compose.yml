services:
  # =====================================================================
  # POSTGRES PGVECTOR
  # =====================================================================
  postgres:
    image: ankane/pgvector:latest
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      RABBITMQ_DEFAULT_PASS: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata 
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/postgres/init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - eshop-network 

  # =====================================================================
  # REDIS
  # =====================================================================
  redis:
    image: redis:7
    container_name: redis
    command: 
      - redis-server
      - --requirepass ${REDIS_PASSWORD}
      - --maxmemory 1gb
      - --maxmemory-policy allkeys-lru
      - --appendonly yes
      - --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - eshop-network

  # =====================================================================
  # RABBITMQ
  # =====================================================================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - rmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - eshop-network


volumes:
  pg_data:
  redis_data:
  rmq_data:

networks:
  eshop-network:
    driver: bridge